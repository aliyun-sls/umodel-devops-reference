services:
  data-generator:
    build:
      context: ./devops_data_generator
      dockerfile: Dockerfile
    container_name: umodel-devops-generator
    restart: unless-stopped
    volumes:
      - ./devops_data_generator/config:/app/config:ro
      - ./devops_data_generator/logs:/app/logs
    environment:
      PYTHONUNBUFFERED: "1"
    command: ["python3", "main.py", "--mode", "continuous", "--config", "/app/config"]

# Usage:
#   1. Copy the sample config for your provider:
#      cp devops_data_generator/config/app_config.gitlab.yaml.sample \
#         devops_data_generator/config/app_config.yaml
#      # or
#      cp devops_data_generator/config/app_config.codeup.yaml.sample \
#         devops_data_generator/config/app_config.yaml
#
#   2. Fill in credentials in app_config.yaml
#
#   3. Run:
#      docker compose up --build
