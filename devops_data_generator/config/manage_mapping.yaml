# 开发人员管理代码仓库映射配置文件
# 第一版仍保留静态 truth surface，但仓库标识统一改为 GitLab path_with_namespace。

manage_mappings:
  "<DEVELOPER_NAME_OR_USERNAME>":
    repositories:
      - "<GITLAB_PATH_WITH_NAMESPACE>"

